# ⚠️ ИСТОЧНИК ИСТИНЫ ДЛЯ ДОМЕНА translate.seoshkin.tools — этот файл в git проекта translate.
# НЕ редактировать на сервере вручную: перетрут — восстанавливается `git checkout -- nginx/`.
# Монтируется в шлюз seoshkin_nginx как /etc/nginx/conf.d/translate.conf (см. nginx/README.md).
# translate.seoshkin.tools — ДОПОЛНИТЕЛЬНЫЙ домен (основной — deutschlernen.ai); живёт, пока
# ученики не переведены на новый домен.
#
# ВАЖНО: proxy_pass идёт на имя контейнера translate-frontend-1:80 (шлюз в docker-сети
# translate_default), НЕ на 127.0.0.1 — внутри контейнера это был бы сам nginx, а не приложение.

server {
    listen 80;
    server_name translate.seoshkin.tools;
    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; allow all; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name translate.seoshkin.tools;

    ssl_certificate     /etc/letsencrypt/live/translate.seoshkin.tools/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/translate.seoshkin.tools/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 200m;

    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; allow all; }

    location / {
        proxy_pass         http://translate-frontend-1:80;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 900s;
    }
}
