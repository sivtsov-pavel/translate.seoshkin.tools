# ⚠️ ИСТОЧНИК ИСТИНЫ ДЛЯ ДОМЕНА deutschlernen.ai — этот файл в git проекта translate.
# НЕ редактировать на сервере вручную: перетрут — восстанавливается `git checkout -- nginx/`.
# Монтируется в шлюз seoshkin_nginx как /etc/nginx/conf.d/deutschlernen.conf (см. nginx/README.md).
# deutschlernen.ai — ОСНОВНОЙ боевой домен приложения (translate.seoshkin.tools — дополнительный).
#
# ⏳ 443-блок ниже ЗАКОММЕНТИРОВАН до выпуска сертификата (иначе nginx не стартует — нет файла
#    серта). Порядок: (1) выпустить серт certbot'ом по 80-challenge → (2) раскомментировать 443 →
#    (3) git pull + reload. Подробно — nginx/README.md.

server {
    listen 80;
    server_name deutschlernen.ai www.deutschlernen.ai;
    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; allow all; }
    location / { return 301 https://$host$request_uri; }
}

