# ⚠️ ИСТОЧНИК ИСТИНЫ ДЛЯ ДОМЕНА deutschlernen.ai — этот файл в git проекта translate.
# deutschlernen.ai — ОСНОВНОЙ боевой домен приложения (translate.seoshkin.tools — дополнительный).
#
# 📌 ФАКТ НА 2026-07-17: домен ПОДНЯТ и работает по HTTPS. Но временно, безопасным способом,
#    server-блоки дописаны прямо в СЕРВЕРНЫЙ файл /var/www/translate.seoshkin.tools/nginx.conf
#    (он уже смонтирован в шлюз seoshkin_nginx; так обошлись без пересоздания контейнера).
#    Этот git-файл — эталон/резерв. В «день разноса» (см. nginx/README.md) переносим на прямое
#    монтирование именно этого файла и убираем дубликат из серверного nginx.conf.
# ⚠️ АВТОПРОДЛЕНИЕ СЕРТА: серт Let's Encrypt живёт 90 дней. Проверить, что deutschlernen.ai
#    попадает в механизм renew шлюза (иначе ~2026-10 отвалится). См. TODO в resume-state.

server {
    listen 80;
    server_name deutschlernen.ai www.deutschlernen.ai;
    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; allow all; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name deutschlernen.ai www.deutschlernen.ai;

    ssl_certificate     /etc/letsencrypt/live/deutschlernen.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deutschlernen.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 200m;

    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; allow all; }

    location / {
        proxy_pass         http://translate-frontend-1:80;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 900s;
    }
}
