server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── PWA: сервис-воркер и манифест ──────────────────────────────────────
    # sw.js никогда не кешируем — браузер должен брать свежий
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # workbox helper — тоже без кеша
    location ~* workbox.*\.js$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Web App Manifest — правильный MIME-тип обязателен для Chrome
    location = /manifest.webmanifest {
        types { }
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # registerSW.js — без кеша
    location = /registerSW.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # index.html — никогда не кешируем (важно для обновлений после деплоя)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # manifest.json — правильный MIME + без долгого кеша
    location = /manifest.json {
        types { }
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # ── Android: APK и Digital Asset Links (TWA) ───────────────────────────
    # APK — правильный MIME, иначе Android не предложит установку
    location ~* \.apk$ {
        types { }
        default_type application/vnd.android.package-archive;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # assetlinks.json — верификация домена для TWA (убирает адресную строку)
    location = /.well-known/assetlinks.json {
        types { }
        default_type application/json;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # ── Основной роутинг SPA ────────────────────────────────────────────────
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # ── API ────────────────────────────────────────────────────────────────
    location ~ ^/api/lessons/[0-9]+/process {
        proxy_pass http://backend:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        client_max_body_size 200m;
    }

    location /api/admin/ {
        proxy_pass http://backend:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    location /api/ {
        proxy_pass http://backend:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;  # запас на резку большого PDF (pdftoppm) до ответа 202
        client_max_body_size 200m;
    }

    location /uploads/ {
        proxy_pass http://backend:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── Статика с долгим кешем (assets/*.js, *.css с хешем в имени) ────────
    location ~* ^/assets/.+\.(js|css|png|jpg|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript application/manifest+json;
}
