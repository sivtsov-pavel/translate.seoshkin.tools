# Конфиг для сервера (не Docker) — кладёшь в /etc/nginx/sites-available/translate.seoshkin.tools
# и делаешь symlink: ln -s /etc/nginx/sites-available/translate.seoshkin.tools /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name translate.seoshkin.tools;

    # Перенаправляем на HTTPS (раскомментировать после получения SSL сертификата)
    # return 301 https://$host$request_uri;

    # Всё проксируем на frontend контейнер (порт 8091)
    location / {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Для загрузки фото учебника
        client_max_body_size 50m;
    }
}

